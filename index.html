<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE MASTER - Absensi Sistem NIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- HEADER -->
    <header class="bg-[#0f172a] text-white p-4 shadow-md">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.jpeg.jpeg" alt="Logo" class="h-10 w-10 rounded-lg object-contain bg-white/10 p-1" onerror="this.src='https://via.placeholder.com/40/ffffff/000000?text=CM'">
                <div>
                    <h1 class="text-xl font-bold tracking-tight">CODE MASTER</h1>
                    <p class="text-xs text-gray-300">Satu baris code menembus dunia</p>
                </div>
            </div>
            <span class="text-xs bg-emerald-500 text-white font-semibold px-3 py-1 rounded-full">Sistem NIS</span>
        </div>
    </header>

    <!-- FORM UTAMA -->
    <main class="container mx-auto p-4 md:p-8 max-w-xl">
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100">
            
            <h2 class="text-2xl font-bold text-gray-900 mb-1">Presensi Siswa</h2>
            <p class="text-sm text-gray-500 mb-6">Masukkan NIS Anda untuk verifikasi identitas.</p>

            <form id="absenForm" class="space-y-5">
                
                <!-- Input NIS + Tombol Cek -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nomor Induk Siswa (NIS)</label>
                    <div class="flex gap-2">
                        <input type="number" id="nis" name="nis" required placeholder="Contoh: 1001"
                               class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#0f172a] outline-none text-gray-900">
                        <button type="button" id="btnCekNis" onclick="checkNIS()" 
                                class="bg-[#0f172a] hover:bg-black text-white px-5 py-3 rounded-xl font-semibold text-sm transition">
                            Cek
                        </button>
                    </div>
                    <p id="nisStatus" class="text-xs mt-1.5 hidden"></p>
                </div>

                <!-- Nama Lengkap (Auto-Fill) -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap</label>
                    <input type="text" id="nama" name="nama" readonly placeholder="Terisi otomatis..."
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-100 text-gray-600 cursor-not-allowed">
                </div>

                <!-- Kelas (Auto-Fill) -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kelas</label>
                    <input type="text" id="kelas" name="kelas" readonly placeholder="Terisi otomatis..."
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-100 text-gray-600 cursor-not-allowed">
                </div>

                <!-- Status Kehadiran -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Status Kehadiran</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="status" value="Hadir" checked class="peer hidden">
                            <div class="text-center py-3 rounded-xl border border-gray-200 text-sm font-semibold text-gray-700 peer-checked:bg-emerald-600 peer-checked:text-white peer-checked:border-emerald-600 transition">
                                Hadir ✅
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="status" value="Izin" class="peer hidden">
                            <div class="text-center py-3 rounded-xl border border-gray-200 text-sm font-semibold text-gray-700 peer-checked:bg-amber-500 peer-checked:text-white peer-checked:border-amber-500 transition">
                                Izin ✉️
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="status" value="Sakit" class="peer hidden">
                            <div class="text-center py-3 rounded-xl border border-gray-200 text-sm font-semibold text-gray-700 peer-checked:bg-red-500 peer-checked:text-white peer-checked:border-red-500 transition">
                                Sakit 🤢
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Catatan -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Catatan / Keterangan</label>
                    <textarea id="catatan" name="catatan" rows="2" placeholder="Isi alasan jika Izin/Sakit..."
                              class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#0f172a] outline-none text-sm"></textarea>
                </div>

                <!-- Tombol Submit -->
                <button type="submit" id="submitBtn" disabled
                        class="w-full bg-[#0f172a] hover:bg-black text-white font-bold py-3.5 px-6 rounded-xl shadow-md transition opacity-50 cursor-not-allowed">
                    <span id="btnText">Kirim Absen</span>
                </button>

            </form>
        </div>
    </main>

    <script>
        // PASTE URL WEB APP APPS SCRIPT BARU ANDA DI SINI
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw5Ij_GEzTNmms7fMcGSz5fepcUxXUMGz-FU7OsOwnNgie72S1n6eXaBztwz0t5TFiP/exec";

        const btnCek = document.getElementById('btnCekNis');
        const nisStatus = document.getElementById('nisStatus');
        const inputNama = document.getElementById('nama');
        const inputKelas = document.getElementById('kelas');
        const submitBtn = document.getElementById('submitBtn');

        // 1. Cek NIS ke Google Sheets
        function checkNIS() {
            const nis = document.getElementById('nis').value;
            if (!nis) {
                showStatus("Masukkan NIS terlebih dahulu!", "red");
                return;
            }

            btnCek.innerText = "...";
            btnCek.disabled = true;

            fetch(`${GAS_URL}?action=checkNIS&nis=${nis}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        inputNama.value = data.nama;
                        inputKelas.value = data.kelas;
                        showStatus(` Siswa ditemukan: ${data.nama}`, "green");
                        
                        // Aktifkan tombol kirim
                        submitBtn.disabled = false;
                        submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    } else {
                        resetFormAuto();
                        showStatus("❌ NIS tidak terdaftar di sistem!", "red");
                    }
                })
                .catch(err => {
                    showStatus("❌ Gagal terhubung ke server.", "red");
                })
                .finally(() => {
                    btnCek.innerText = "Cek";
                    btnCek.disabled = false;
                });
        }

        function showStatus(msg, color) {
            nisStatus.innerText = msg;
            nisStatus.classList.remove('hidden', 'text-red-600', 'text-emerald-600');
            nisStatus.classList.add(color === "red" ? 'text-red-600' : 'text-emerald-600');
        }

        function resetFormAuto() {
            inputNama.value = "";
            inputKelas.value = "";
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
        }

        // 2. Submit Absen
        document.getElementById('absenForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            submitBtn.disabled = true;
            document.getElementById('btnText').innerText = "Mengirim...";

            const payload = {
                nis: document.getElementById('nis').value,
                nama: inputNama.value,
                kelas: inputKelas.value,
                status: document.querySelector('input[name="status"]:checked').value,
                catatan: document.getElementById('catatan').value
            };

            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("✅ Absen Berhasil Dicatat!");
                document.getElementById('absenForm').reset();
                resetFormAuto();
                nisStatus.classList.add('hidden');
            })
            .catch(err => alert("Gagal mengirim data."))
            .finally(() => {
                document.getElementById('btnText').innerText = "Kirim Absen";
            });
        });
    </script>
</body>
</html>
